name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Show publish toolchain
        run: |
          node --version
          npm --version
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run check

      - name: Build
        run: pnpm run build

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "${NODE_AUTH_TOKEN}" ]; then
            echo "Publishing with NPM_TOKEN"
            npm publish --provenance --access public
          else
            echo "Publishing with npm trusted publishing via OIDC"
            echo "If this fails, configure npm trusted publishing for workflow file release.yml."
            npm publish --provenance --access public
          fi
      - name: Explain npm auth failure
        if: failure()
        run: |
          echo "npm publish failed."
          echo "Either:"
          echo "1. add repository secret NPM_TOKEN with publish access, or"
          echo "2. configure npm trusted publishing for Hazel-Lin/chroniq with workflow filename release.yml"
          exit 1
